[server]
host-name=homeassistant-cups
domain-name=local
# Bind to primary network interface
allow-interfaces=eth0
use-ipv4=yes
use-ipv6=no
cache-entries-max=4096

[wide-area]
enable-wide-area=no

[publish]
# Enable hinfo for better device discovery
publish-hinfo=yes
publish-addresses=yes
publish-workstation=no
publish-domain=yes
